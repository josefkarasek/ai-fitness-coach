name: Forge
description: Thin Flutter client for the Forge backend.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.1
  file_picker: 10.3.10
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.0.4
  http: ^1.5.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.39

dev_dependencies:
  build_runner: ^2.7.1
  drift_dev: ^2.28.1
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/anvil.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/anvil.png
  min_sdk_android: 21
