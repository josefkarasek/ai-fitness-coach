name: Release Backend

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-backend
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image coordinates
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: |
          image_repo="ghcr.io/josefkarasek/liftsforge-backend"
          image_tag="${RELEASE_TAG:-sha-${SHA}}"
          echo "repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "release_image=${image_repo}:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.release_image }}
            ${{ steps.image.outputs.repo }}:latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway configuration
        run: |
          test -n "$RAILWAY_API_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_SERVICE"
          test -n "$RAILWAY_ENVIRONMENT"

      - name: Point Railway service to released image
        run: |
          railway service source connect \
            --image "${{ steps.image.outputs.release_image }}" \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE" \
            --json

      - name: Redeploy Railway service from image source
        run: |
          railway redeploy \
            --from-source \
            --yes \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE"
